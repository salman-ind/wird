<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tasbih</title>
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Tasbih%22,%22short_name%22:%22Tasbih%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22orientation%22:%22portrait%22,%22background_color%22:%22%2309090c%22,%22theme_color%22:%22%2309090c%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='100'%20fill='%2308090c'/%3E%3Ccircle%20cx='256'%20cy='256'%20r='210'%20fill='none'%20stroke='%231c2430'%20stroke-width='2'%20stroke-dasharray='8%2014'/%3E%3Ccircle%20cx='256'%20cy='256'%20r='190'%20fill='none'%20stroke='%23161e28'%20stroke-width='22'/%3E%3Ccircle%20cx='256'%20cy='256'%20r='190'%20fill='none'%20stroke='%23c9aa52'%20stroke-width='22'%20stroke-linecap='round'%20stroke-dasharray='894.6'%20stroke-dashoffset='224'%20transform='rotate(-90%20256%20256)'/%3E%3Ctext%20x='256'%20y='286'%20text-anchor='middle'%20font-family='serif'%20font-size='130'%20fill='%23c9aa52'%3E%D8%B0%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}">
  <meta name="theme-color" content="#09090c" id="themeMetaColor">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tasbih">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    /* ── Dark theme (default) ── */
    :root, [data-theme="dark"] {
      --bg:#09090c; --surface:#0f1115; --surface2:#161b22;
      --border:#1e222c; --border2:#262c38;
      --gold:#c9aa52; --gold-soft:#dfc070; --gold-dim:#7a6430; --gold-glow:rgba(201,170,82,0.22);
      --text:#dfd8c8; --text-sub:#998d7c; --text-muted:#4e4840;
      --track:#13171f;
      --hdr-bg:#0b0c10;
      --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
    }

    /* ── Light theme ── */
    [data-theme="light"] {
      --bg:#f5f0e8; --surface:#fffdf7; --surface2:#f0ebe0;
      --border:#ddd6c6; --border2:#ccc4b0;
      --gold:#9a7a28; --gold-soft:#b8942e; --gold-dim:#c4a44a; --gold-glow:rgba(154,122,40,0.18);
      --text:#2a2418; --text-sub:#6b5e48; --text-muted:#a89880;
      --track:#e4ddd0;
      --hdr-bg:#edeadf;
    }

    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cinzel',serif;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;transition:background 0.3s,color 0.3s}

    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(201,170,82,0.055) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(201,170,82,0.035) 0%,transparent 60%)}

    #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}

    /* ── Top bar ── */
    .top-bar{
      flex-shrink:0;
      display:flex; align-items:center; justify-content:flex-end;
      gap:6px;
      padding:calc(var(--safe-t) + 8px) 14px 8px;
      background:var(--hdr-bg);
      border-bottom:1px solid var(--border);
      transition:background 0.3s;
    }

    .icon-toggle{
      width:38px; height:38px;
      display:flex; align-items:center; justify-content:center;
      border-radius:10px;
      background:var(--surface2);
      border:1px solid var(--border);
      cursor:pointer;
      font-size:17px; line-height:1;
      color:var(--text-sub);
      transition:all 0.18s;
      user-select:none;
    }
    .icon-toggle:active{opacity:0.65}
    .icon-toggle.on{ color:var(--gold); border-color:var(--gold-dim); background:rgba(201,170,82,0.09) }
    .icon-toggle.off{ color:var(--text-muted) }

    /* ── Tabs ── */
    .tab{display:none;flex:1;overflow-y:auto;overflow-x:hidden}
    .tab.active{display:flex;flex-direction:column}

    /* ── Counter ── */
    #tab-counter{align-items:center;justify-content:center;gap:0;padding:16px 24px calc(var(--safe-b) + 16px)}

    .ring-wrap{position:relative;width:min(72vw,310px);height:min(72vw,310px);flex-shrink:0;margin-bottom:10px}
    .tap-zone{position:absolute;inset:0;border-radius:50%;cursor:pointer;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center}
    .tap-zone.tapped{animation:tapPop 0.17s ease}
    @keyframes tapPop{0%,100%{transform:scale(1)}40%{transform:scale(0.955)}}

    .ring-svg{width:100%;height:100%;overflow:visible}
    .r-track{fill:none;stroke:var(--track);stroke-width:14;transition:stroke 0.3s}
    .r-fill{fill:none;stroke:url(#rg);stroke-width:14;stroke-linecap:round;transform-origin:50% 50%;transform:rotate(-90deg);transition:stroke-dashoffset 0.28s cubic-bezier(0.4,0,0.2,1)}
    .r-fill.done{filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 18px var(--gold-glow));transition:stroke-dashoffset 0.28s cubic-bezier(0.4,0,0.2,1),filter 0.4s}

    .ring-wrap::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:1.5px solid var(--gold);opacity:0;pointer-events:none}
    .ring-wrap.glow::after{animation:outerGlow 0.55s ease-out forwards}
    @keyframes outerGlow{0%{opacity:0.5;transform:scale(0.93)}100%{opacity:0;transform:scale(1.05)}}

    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
    .count-num{font-size:clamp(68px,18vw,90px);font-weight:500;color:var(--text);line-height:1;transition:transform 0.08s ease,color 0.3s}
    .count-num.bump{transform:scale(1.12)}
    .count-of{font-size:15px;font-weight:400;letter-spacing:0.06em;color:var(--text-sub);margin-top:8px;transition:color 0.3s}

    /* ── Goal ── */
    .goal-wrap{display:flex;align-items:center;gap:10px;margin-top:28px;flex-shrink:0}
    .goal-label{font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted);transition:color 0.3s}
    .goal-pills{display:flex;gap:7px}
    .pill{padding:8px 16px;border-radius:20px;font-family:'Cinzel',serif;font-size:14px;letter-spacing:0.05em;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-sub);transition:all 0.18s}
    .pill.active{border-color:var(--gold-dim);background:rgba(201,170,82,0.1);color:var(--gold)}
    .pill:active{opacity:0.7}

    .goal-custom-wrap{display:flex;align-items:center;gap:8px;margin-top:14px}
    .goal-input{width:100px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cinzel',serif;font-size:17px;text-align:center;outline:none;appearance:none;-moz-appearance:textfield;transition:border-color 0.2s,background 0.3s,color 0.3s}
    .goal-input::-webkit-inner-spin-button,.goal-input::-webkit-outer-spin-button{-webkit-appearance:none}
    .goal-input:focus{border-color:var(--gold-dim)}
    .goal-set-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--gold-dim);background:rgba(201,170,82,0.08);color:var(--gold);font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.1em;cursor:pointer;transition:all 0.18s}
    .goal-set-btn:active{opacity:0.7}

    .reset-btn{margin-top:32px;padding:16px 52px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text-sub);font-family:'Cinzel',serif;font-size:14px;letter-spacing:0.13em;cursor:pointer;transition:all 0.2s;flex-shrink:0}
    .reset-btn:active{color:var(--text);border-color:var(--text-muted)}

    /* ── Flash ── */
    .flash{position:fixed;inset:0;pointer-events:none;z-index:100;background:radial-gradient(circle at 50% 45%,rgba(201,170,82,0.16) 0%,transparent 68%);opacity:0}
    .flash.show{animation:flashIn 0.6s ease-out forwards}
    @keyframes flashIn{0%{opacity:1}100%{opacity:0}}

    /* ── Adhkar placeholder ── */
    #tab-adhkar{align-items:center;justify-content:center;padding:32px 24px;gap:18px;text-align:center}
    .placeholder-icon{font-family:'Amiri',serif;font-size:58px;color:var(--gold);opacity:0.45;line-height:1}
    .placeholder-title{font-size:16px;letter-spacing:0.12em;color:var(--text-sub)}
    .placeholder-sub{font-size:13.5px;letter-spacing:0.06em;color:var(--text-muted);line-height:1.8;max-width:260px}

    /* ── Nav ── */
    .nav{flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-b);transition:background 0.3s}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;background:none;border:none;cursor:pointer;color:var(--text-muted);gap:4px;transition:color 0.2s}
    .nav-btn.active{color:var(--gold)}
    .nav-icon{font-size:23px;line-height:1}
    .nav-lbl{font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase}

    ::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
<div id="app">
  <div class="flash" id="flash"></div>

  <!-- ── Top bar ── -->
  <div class="top-bar">
    <button class="icon-toggle on"  id="btnHaptic" onclick="toggleHaptic()" title="Haptics">📳</button>
    <button class="icon-toggle on"  id="btnSound"  onclick="toggleSound()"  title="Sound">🔊</button>
    <button class="icon-toggle on"  id="btnTheme"  onclick="toggleTheme()"  title="Theme">🌙</button>
    <button class="icon-toggle off" id="btnInstall" onclick="installApp()"  title="Install app" style="display:none">⬇️</button>
  </div>

  <!-- ── Counter ── -->
  <section class="tab active" id="tab-counter">
    <div class="ring-wrap" id="ringWrap">
      <div class="tap-zone" id="tapZone" onclick="tap()">
        <svg class="ring-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#c9aa52"/>
              <stop offset="50%"  stop-color="#dfc070"/>
              <stop offset="100%" stop-color="#c9aa52"/>
            </linearGradient>
          </defs>
          <circle cx="140" cy="140" r="118" fill="none" stroke="#1e222c" stroke-width="0.8" stroke-dasharray="4 11" id="ringDeco"/>
          <circle cx="140" cy="140" r="128" class="r-track"/>
          <circle cx="140" cy="140" r="128" class="r-fill" id="ringFill"
            stroke-dasharray="804.25" stroke-dashoffset="804.25"/>
        </svg>
        <div class="ring-center">
          <div class="count-num" id="countNum">0</div>
          <div class="count-of"  id="countOf">of 33</div>
        </div>
      </div>
    </div>

    <div class="goal-wrap">
      <span class="goal-label">Goal</span>
      <div class="goal-pills">
        <button class="pill active" onclick="setGoal(33,  this)">33</button>
        <button class="pill"        onclick="setGoal(99,  this)">99</button>
        <button class="pill"        onclick="setGoal(100, this)">100</button>
      </div>
    </div>

    <div class="goal-custom-wrap">
      <input class="goal-input" id="goalInput" type="number" min="1" max="9999"
             placeholder="custom" onkeydown="if(event.key==='Enter')applyCustom()">
      <button class="goal-set-btn" onclick="applyCustom()">Set</button>
    </div>

    <button class="reset-btn" onclick="reset()">↺  Reset</button>
  </section>

  <!-- ── Adhkar placeholder ── -->
  <section class="tab" id="tab-adhkar">
    <div class="placeholder-icon">الأذكار</div>
    <div class="placeholder-title">Morning &amp; Evening Adhkar</div>
    <div class="placeholder-sub">
      Authentic adhkar from the Sunnah —<br>
      Ṣaḥīḥ sources · full Arabic text ·<br>
      transliteration &amp; translation.<br><br>
      Coming in the next build.
    </div>
  </section>

  <!-- ── Nav ── -->
  <nav class="nav">
    <button class="nav-btn active" data-tab="counter" onclick="goTab('counter')">
      <span class="nav-icon">◉</span>
      <span class="nav-lbl">Counter</span>
    </button>
    <button class="nav-btn" data-tab="adhkar" onclick="goTab('adhkar')">
      <span class="nav-icon">☾</span>
      <span class="nav-lbl">Adhkar</span>
    </button>
  </nav>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
const CIRC = 2 * Math.PI * 128; // 804.25
let count  = 0, goal = 33;
let soundOn  = true;
let hapticOn = true;
let isDark   = true;

// ── DOM refs ──────────────────────────────────────────────────────
const ringFill  = document.getElementById('ringFill');
const countNum  = document.getElementById('countNum');
const countOf   = document.getElementById('countOf');
const tapZone   = document.getElementById('tapZone');
const ringWrap  = document.getElementById('ringWrap');
const flash     = document.getElementById('flash');
const btnSound  = document.getElementById('btnSound');
const btnHaptic = document.getElementById('btnHaptic');
const btnTheme  = document.getElementById('btnTheme');
const ringDeco  = document.getElementById('ringDeco');

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Soft melodic tap beep — short sine tone with smooth envelope
function beepTap() {
  if (!soundOn) return;
  try {
    const ctx  = getAudioCtx();
    const now  = ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type      = 'sine';
    osc.frequency.setValueAtTime(880, now);           // A5 — bright but soft
    osc.frequency.exponentialRampToValueAtTime(660, now + 0.07); // gentle fall to E5

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.008); // fast attack
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18); // smooth decay

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.2);
  } catch(_) {}
}

// Richer completion chime — 3-note ascending arpeggio
function beepComplete() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    [[0, 660, 0.22], [0.12, 880, 0.22], [0.24, 1100, 0.28]].forEach(([delay, freq, vol]) => {
      const now  = ctx.currentTime + delay;
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.6);
    });
  } catch(_) {}
}

// ── Haptics ───────────────────────────────────────────────────────
function vibrate(pattern) {
  if (!hapticOn) return;
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── Core tap ──────────────────────────────────────────────────────
function tap() {
  if (count >= goal) return;

  vibrate(22);
  beepTap();
  count++;

  countNum.classList.remove('bump'); void countNum.offsetWidth; countNum.classList.add('bump');
  setTimeout(() => countNum.classList.remove('bump'), 110);
  tapZone.classList.remove('tapped'); void tapZone.offsetWidth; tapZone.classList.add('tapped');

  draw();
  if (count >= goal) onComplete();
}

function onComplete() {
  vibrate([40, 30, 80, 30, 140]);
  beepComplete();
  ringFill.classList.add('done');
  ringWrap.classList.remove('glow'); void ringWrap.offsetWidth; ringWrap.classList.add('glow');
  flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
}

function reset() {
  count = 0;
  ringFill.classList.remove('done');
  vibrate(14);
  draw();
}

// ── Draw ──────────────────────────────────────────────────────────
function draw() {
  const p = Math.min(count / goal, 1);
  ringFill.style.strokeDashoffset = CIRC * (1 - p);
  countNum.textContent = count;
  countOf.textContent  = 'of ' + goal;
}

// ── Goal ─────────────────────────────────────────────────────────
function setGoal(val, btn) {
  goal = val;
  document.getElementById('goalInput').value = '';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  reset();
}

function applyCustom() {
  const v = parseInt(document.getElementById('goalInput').value);
  if (!v || v < 1) return;
  goal = Math.min(v, 9999);
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  reset();
}

// ── Toggles ───────────────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  btnTheme.textContent   = isDark ? '🌙' : '☀️';
  // keep deco ring color in sync
  ringDeco.setAttribute('stroke', isDark ? '#1e222c' : '#ccc4b0');
  document.getElementById('themeMetaColor').setAttribute('content', isDark ? '#09090c' : '#f5f0e8');
}

function toggleSound() {
  soundOn = !soundOn;
  btnSound.textContent = soundOn ? '🔊' : '🔇';
  btnSound.classList.toggle('on',  soundOn);
  btnSound.classList.toggle('off', !soundOn);
  // Unlock AudioContext on first user interaction if needed
  if (soundOn && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleHaptic() {
  hapticOn = !hapticOn;
  btnHaptic.textContent = hapticOn ? '📳' : '📴';
  btnHaptic.classList.toggle('on',  hapticOn);
  btnHaptic.classList.toggle('off', !hapticOn);
}

// ── Tabs ──────────────────────────────────────────────────────────
function goTab(id) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector('[data-tab="' + id + '"]').classList.add('active');
}

// ── Keyboard ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('tab-counter').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); tap(); }
  if (e.code === 'KeyR') reset();
});

// ── Wake lock ─────────────────────────────────────────────────────
async function acquireWakeLock() {
  if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch(_){} }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    acquireWakeLock();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

// ── PWA Install prompt ────────────────────────────────────────────
let deferredInstallPrompt = null;
const btnInstall = document.getElementById('btnInstall');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  btnInstall.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  btnInstall.style.display = 'none';
  deferredInstallPrompt = null;
});

async function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') btnInstall.style.display = 'none';
  deferredInstallPrompt = null;
}

// ── Init ──────────────────────────────────────────────────────────
draw();
acquireWakeLock();
</script>
</body>
</html>
